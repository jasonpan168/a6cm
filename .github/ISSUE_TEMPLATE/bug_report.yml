name: 🐛 Bug 报告
description: 报告一个问题，帮助我们改进 A6.cm
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈！请尽量填写以下信息，便于快速定位问题。
        ⚠️ 请勿在 Issue 中粘贴任何真实密码、密钥或 `.env` 内容。
  - type: textarea
    id: what-happened
    attributes:
      label: 问题描述
      description: 清晰描述出现了什么问题。
      placeholder: 例如：访问 /xxx 短链接时返回 500……
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 我们如何复现这个问题？
      placeholder: |
        1. 进入 '...'
        2. 点击 '...'
        3. 看到错误
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么？
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: 运行环境
      description: PHP 版本、数据库（MySQL/SQLite）、Web 服务器、操作系统等。
      placeholder: |
        - PHP: 8.2
        - 数据库: MySQL 8.0 / SQLite 3
        - Web 服务器: Nginx 1.24
        - 操作系统: Ubuntu 22.04
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图
      description: 相关的错误日志或截图（请先脱敏）。
      render: shell
    validations:
      required: false
