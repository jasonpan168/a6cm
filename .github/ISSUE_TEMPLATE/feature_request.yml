name: ✨ 功能建议
description: 提出一个新功能或改进想法
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
      description: 这个建议是为了解决什么痛点？
      placeholder: 例如：希望短链接支持自定义有效期……
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你希望它怎么工作？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过的其它做法（可选）。
    validations:
      required: false
